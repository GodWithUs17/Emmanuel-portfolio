     <style>
       /* 1. Reset & Global */
       * { box-sizing: border-box; margin: 0; padding: 0; }
       body { background-color: #ffffff; min-height: 100vh; font-family: system-ui, -apple-system, sans-serif; }
     
       /* 2. Navbar Skeleton (Matches your React <nav> and container) */
       nav {
         width: 100%;
         background-color: #ffffff;
         border-bottom: 1px solid #e5e7eb; /* Matches 'border-b' */
         position: sticky;
         top: 0;
         z-index: 50;
         height: 73px; /* Precise height of your navbar */
       }
     
       .nav-container {
         max-width: 72rem; /* Matches 'max-w-6xl' */
         margin: 0 auto;
         padding: 1rem; /* Matches 'px-4 py-4' */
         display: flex;
         justify-content: space-between;
         align-items: center;
       }
     
       /* 3. Logo Skeleton (Prevents text shifting) */
       .logo-placeholder {
         font-weight: 700;
         font-size: 1.25rem; /* Matches 'text-xl' */
         letter-spacing: -0.05em; /* Matches 'tracking-tighter' */
         /* Pre-styling the gradient colors so it doesn't jump */
         color: #9333ea; 
       }
     
       /* 4. Profile Image Skeleton (Updated to match your Hero grid) */
       .lcp-skeleton {
         width: 240px; 
         height: 240px; 
         border-radius: 9999px;
         background-color: #f3f4f6;
         margin: 0 auto;
         display: block;
         border: 4px solid #ffffff;
       }
     
       @media (min-width: 768px) {
         .lcp-skeleton {
           width: 288px;
           height: 288px;
           margin-left: auto;
           margin-right: 0;
         }
       }
     </style>
